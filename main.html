<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js"></script>
	<form method="post">
		<label for="name">Name:</label>
		<input type="text" id="name" placeholder="Name" required><br>
		<label for="email">Email</label>
		<input type="email" id="email" placeholder="Email" required><br>
		<label for="gender_m">Male:</label>
		<input type="radio" id="gender_m" required><br>
		<label for="gender_f">Female:</label>
		<input type="radio" id="gender_f" required><br>
		<label for="cars">Model:</label>
		<input type="select" id="cars" placeholder="Please select an option" required><br>
		<label for="age">Age:</label>
		<input type="number" id="age" placeholder="Age" required><br>
		<label for="dob">Dob:</label>
		<input type="date" id="dob" required><br>
		<label for="tel">Phone number:</label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx"><br>
		<label for="password">password:</label>
		<input type="password" id="password" placeholder="password" required><br>
		<input type="checkbox" id="tos" required value="I agree to TOS">
		<label for="tos">I agree to TOS</label><br>
		<button type="submit">Submit</button>
	</form>

</body>

</html>
